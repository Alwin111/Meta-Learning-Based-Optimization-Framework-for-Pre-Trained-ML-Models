experiment:
  name: default_experiment
  seed: 42

model:
  type: random_forest  # override in specific configs

training:
  epochs: 10
  batch_size: 32

export:
  enable_onnx: true
  opset_version: 12

optimization:
  enable_quantization: false
  quantization_type: dynamic

benchmark:
  num_runs: 100
  warmup_runs: 10
