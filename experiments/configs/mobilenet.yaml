experiment_name: mobilenet_experiment

model_name: mobilenet_v2

training:
  batch_size: 1
  test_size: 0.2
  random_state: 42

optimization:
  enabled: true
  type: quantization
  backend: onnx
  quantization:
    mode: dynamic
    weight_type: qint8
  save_suffix: "_quantized"
  compare_size: true
